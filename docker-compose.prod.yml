# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    build:
      target: production
    environment:
      NODE_ENV: production
    volumes: []
    restart: always

  frontend:
    build:
      target: production
    volumes: []
    restart: always

  redisinsight:
    restart: always

  pgadmin:
    restart: always

  nginx:
    # TODO Phase 11: add TLS (Let's Encrypt / Cloudflare)
    restart: always
